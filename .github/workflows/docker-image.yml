name: Docker Image CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  build:

    runs-on: ubuntu-latest
    container: ubuntu:20.04

    steps:
    - uses: actions/checkout@v2
    - name: Build the Docker image
      run: lsb_release -a
    - name: Build the Docker image
      run: docker build . --file Dockerfile-plain --tag my-image-name:$(date +%s)
